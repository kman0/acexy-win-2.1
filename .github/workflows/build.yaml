name: Build Windows EXE

on:
  workflow_dispatch: # Keeps it manual, as you requested earlier

jobs:
  build:
    runs-on: windows-latest # CRITICAL: Forces GitHub to use a Windows machine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Matches the original repo version
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build Executable
        # Compiles specifically for Windows and names the output 'acexy.exe'
        # -ldflags "-s -w" strips debugging info to make the file smaller
        run: go build -v -ldflags "-s -w" -o acexy.exe .

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: Acexy-Windows-EXE
          path: acexy.exe
